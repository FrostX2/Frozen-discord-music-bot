<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuriMusic - Admin Login</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="login-body">
<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
    </div>
    <h1>FuriMusic</h1>
    <p class="subtitle">Admin Panel</p>
    <form id="loginForm">
      <div class="input-group">
        <input type="password" id="password" placeholder="Enter admin password" autocomplete="current-password" required>
      </div>
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:13px;color:var(--text-secondary);cursor:pointer">
        <input type="checkbox" id="remember" style="width:auto;accent-color:var(--accent)">
        Remember me forever
      </label>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
      <p id="error" class="error-text" style="display:none"></p>
    </form>
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('error');
  err.style.display = 'none';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: document.getElementById('password').value, remember: document.getElementById('remember').checked })
    });
    if (res.ok) { window.location.href = '/'; }
    else { err.textContent = 'Wrong password'; err.style.display = 'block'; }
  } catch { err.textContent = 'Connection error'; err.style.display = 'block'; }
});
</script>
</body>
</html>
